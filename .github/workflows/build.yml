name: Build CimporApp Installer

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller CimporApp.spec --clean
        
    - name: Clean Artifact (Exclude data/config)
      run: |
        if (Test-Path "dist/CimporApp/files") { Remove-Item -Recurse -Force "dist/CimporApp/files" }
        
    - name: Flatten Artifact (Remove _internal)
      run: |
        dir dist/CimporApp/
        if (Test-Path "dist/CimporApp/_internal") {
          Write-Host "Flattening _internal folder..."
          Get-ChildItem -Path "dist/CimporApp/_internal/*" | Move-Item -Destination "dist/CimporApp/" -Force
          Remove-Item "dist/CimporApp/_internal" -Recurse -Force
        }
        dir dist/CimporApp/
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CimporApp-Windows
        path: dist/CimporApp/
